<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>¡Gracias! — Código V</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --red: #c0392b;
            --red-light: #e74c3c;
            --red-glow: rgba(192,57,43,0.45);
            --gold: #d4a017;
            --dark: #080808;
            --dark2: #101010;
            --dark3: #181818;
            --text: #f0e6e6;
            --muted: #9a8080;
        }
        html { scroll-behavior: smooth; }
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 50% 0%, rgba(192,57,43,0.18) 0%, transparent 65%),
                radial-gradient(ellipse at 50% 100%, rgba(192,57,43,0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            z-index: 1;
            position: relative;
        }
        .check-icon {
            width: 80px;
            height: 80px;
            background: rgba(192,57,43,0.1);
            border: 2px solid var(--red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: var(--red-light);
            font-size: 40px;
            box-shadow: 0 0 20px var(--red-glow);
        }
